app:
  description: '飞书智能 CRM 助手（回复润色版）：调用 DifyCRM API 后，由大模型将结构化结果改写为适合销售人员阅读的飞书回复。'
  icon: 🤖
  icon_background: '#E0F2FE'
  mode: workflow
  name: crm_main_polished
  use_icon_as_answer_icon: false
dependencies: []
kind: app
version: 0.6.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions: []
      allowed_file_types: []
      allowed_file_upload_methods:
      - local_file
      enabled: false
      fileUploadConfig:
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        image_file_size_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: '可直接用自然语言，例如：「帮我看看各渠道获客效果」「列出高分线索」「录入线索：周总，云启科技，官网表单，高意向，预算20万，销售跟进不及时」。仍支持 /help、/获客分析 等指令。'
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - 帮我看看各渠道获客效果
    - 列出当前线索并按评分排序
    - 录入一条高意向线索：周总，云启科技，来自官网，预算20万
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
