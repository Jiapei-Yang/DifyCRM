    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: code
      id: edge_start_merge
      source: start_001
      sourceHandle: source
      target: code_merge_009
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: code
        targetType: llm
      id: edge_merge_llm
      source: code_merge_009
      sourceHandle: source
      target: llm_nl_010
      targetHandle: target
